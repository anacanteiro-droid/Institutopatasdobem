<!DOCTYPE html>
<html lang="pt-br">

    <link rel="shortcut icon" href="imagens/Logo do pet shop.png" type="image/x-icon">
    <link rel="stylesheet" href="senha.css">
    <title>Redefinição de Senha</title>
</head>
<body>
    <main>
  <img class="logotop" src="imagens/Logo (1).png">

        <h1>Redefinição de <br>Senha</h1>

<hr>

        <form action="#" method="post">

        <label class="caixas" for="email">Ensira seu Email :</label>
        <input class="caixas" type="email" id="Email" placeholder="Digite seu Email" required>

        <label class="caixas" for="Senha">Redefina sua Senha:</label>
        <input class="caixas" type="password" id="Senha" placeholder="Digite sua senha" required>

        <label class="caixas" for="ConfirmarSenha">Confirmar Senha:</label>
        <input class="caixas" type="password" id="ConfirmarSenha" placeholder="Digite sua senha novamente" required>
     

        </section>


        <button class="botao" type="submit">Voltar</button>
        <button class="botao" type="submit">Confirmar Redefinição de Senha</button>


    
     </main>
</body>
</html>
